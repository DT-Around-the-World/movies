<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Movie Around the World Challenge</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
margin:40px;
}

h1{
text-align:center;
}

#progress{
text-align:center;
font-size:18px;
margin-bottom:20px;
}

#search{
display:block;
margin:20px auto;
padding:10px;
width:300px;
font-size:16px;
}

table{
width:90%;
margin:auto;
border-collapse:collapse;
background:white;
}

th, td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#333;
color:white;
cursor:pointer;
}

.poster{
width:60px;
border-radius:4px;
}

.flag{
width:28px;
}

.review{
display:none;
position:absolute;
background:#333;
color:white;
padding:10px;
border-radius:6px;
width:250px;
z-index:10;
}

.movie:hover .review{
display:block;
}

.stars{
color:gold;
font-size:16px;
}

</style>

</head>

<body>

<h1>🌍 Our Movie Around the World Challenge</h1>

<div id="progress"></div>

<input id="search" placeholder="Search country or movie...">

<table id="movieTable">

<thead>
<tr>
<th onclick="sortTable(0)">Country</th>
<th>Flag</th>
<th>Poster</th>
<th onclick="sortTable(3)">Movie</th>
<th>Rating</th>
</tr>
</thead>

<tbody id="movieBody">

<tr>
<td>South Korea</td>

<td>
<img class="flag" src="https://flagcdn.com/w40/kr.png">
</td>

<td>
<img class="poster" src="https://m.media-amazon.com/images/I/91hSMHdJt8L.jpg">
</td>

<td class="movie">
<a href="https://en.wikipedia.org/wiki/Parasite_(2019_film)" target="_blank">
Parasite
</a>

<div class="review">
Wildly clever and unpredictable. We loved the twists.
</div>

</td>

<td class="stars">★★★★★</td>

</tr>

<tr>
<td>France</td>

<td>
<img class="flag" src="https://flagcdn.com/w40/fr.png">
</td>

<td>
<img class="poster" src="https://m.media-amazon.com/images/I/71B6W+g0YFL.jpg">
</td>

<td class="movie">
<a href="https://en.wikipedia.org/wiki/Am%C3%A9lie" target="_blank">
Amélie
</a>

<div class="review">
Whimsical, charming, and cozy.
</div>

</td>

<td class="stars">★★★★☆</td>

</tr>

<tr>
<td>Japan</td>

<td>
<img class="flag" src="https://flagcdn.com/w40/jp.png">
</td>

<td>
<img class="poster" src="https://m.media-amazon.com/images/I/81g4C1j2e-L.jpg">
</td>

<td class="movie">

<a href="https://en.wikipedia.org/wiki/Spirited_Away" target="_blank">
Spirited Away
</a>

<div class="review">
Beautiful animation and magical world.
</div>

</td>

<td class="stars">★★★★★</td>

</tr>

</tbody>
</table>

<script>

function updateProgress(){

let rows=document.querySelectorAll("#movieBody tr").length

let totalCountries=195

document.getElementById("progress").innerText=
"🎬 Movies watched: "+rows+" / "+totalCountries

}

updateProgress()


document.getElementById("search").addEventListener("keyup",function(){

let filter=this.value.toLowerCase()

let rows=document.querySelectorAll("#movieBody tr")

rows.forEach(row=>{

let text=row.innerText.toLowerCase()

row.style.display=text.includes(filter)?"":"none"

})

})


function sortTable(n){

let table=document.getElementById("movieTable")

let rows=[...table.rows].slice(1)

let asc=table.classList.toggle("asc")

rows.sort((a,b)=>{

let A=a.cells[n].innerText
let B=b.cells[n].innerText

return asc?A.localeCompare(B):B.localeCompare(A)

})

rows.forEach(tr=>table.appendChild(tr))

}

</script>

</body>
</html>
