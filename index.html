<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Movies Around the World</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/table.css">
<link rel="stylesheet" href="css/responsive.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsvectormap/dist/css/jsvectormap.css">
<script src="https://cdn.jsdelivr.net/npm/jsvectormap/dist/js/jsvectormap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsvectormap/dist/maps/world.js"></script>

</head>

<body>

<div class="appContainer">

<header class="headerBar">
<h1>🌍 Movies Around the World</h1>
</header>

<div class="topLayout">

<div class="card mapCard">
<div id="map"></div>
</div>

<div class="sidePanel">

<div class="card progressCard">
<div id="progress"></div>

<div class="progressBar">
<div class="progressFill" id="progressFill"></div>
</div>
</div>

<div class="card topCard">
<h2 class="sectionTitle">🏆 Top Rated Movies</h2>
<ul id="topMovies" class="topMovies"></ul>
</div>

</div>
</div>

<div class="card tableCard">

<div class="controls">

<input
type="text"
id="searchInput"
placeholder="🔎 Search movie or country"
>

<select id="sortSelect">
<option value="default">Sort</option>
<option value="country">Country A-Z</option>
<option value="rating">Rating High-Low</option>
</select>

<button id="resetBtn">Reset</button>

</div>

<div class="tableWrapper">

<table class="movieTable">

<thead>
<tr>
<th class="countryCol">Country</th>
<th class="movieCol">Movie</th>
<th class="ratingCol">Rating</th>
<th class="reviewCol">Review</th>
<th class="streamCol">Stream</th>
<th class="watchedCol">Watched</th>
</tr>
</thead>

<tbody id="movieBody"></tbody>

</table>

</div>

</div>

</div>

<script src="countries.js"></script>
<script src="movies.js"></script>
<script src="js/app/app.js"></script>


</body>
</html>
