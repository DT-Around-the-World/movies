<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Movie Around the World Challenge</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsvectormap"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsvectormap/dist/css/jsvectormap.css">

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:40px;
}

h1{
text-align:center;
}

#map{
width:90%;
height:450px;
margin:auto;
margin-bottom:40px;
}

#progress{
text-align:center;
font-size:18px;
margin:20px;
}

table{
width:90%;
margin:auto;
border-collapse:collapse;
background:white;
}

th, td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{
background:#333;
color:white;
}

.poster{
width:60px;
}

.flag{
width:28px;
}

.stars{
color:gold;
}

.movie{
position:relative;
}

.review{
display:none;
position:absolute;
background:#333;
color:white;
padding:10px;
border-radius:6px;
width:250px;
}

.movie:hover .review{
display:block;
}

</style>

</head>

<body>

<h1>🌍 Our Movie Around the World Challenge</h1>

<div id="progress"></div>

<div id="map"></div>

<table>

<thead>
<tr>
<th>Country</th>
<th>Flag</th>
<th>Poster</th>
<th>Movie</th>
<th>Rating</th>
</tr>
</thead>

<tbody id="movieBody">

<tr data-country="KR">
<td>South Korea</td>

<td>
<img class="flag" src="https://flagcdn.com/w40/kr.png">
</td>

<td>
<img class="poster" src="https://m.media-amazon.com/images/I/91hSMHdJt8L.jpg">
</td>

<td class="movie">

<a href="https://en.wikipedia.org/wiki/Parasite_(2019_film)" target="_blank">
Parasite
</a>

<div class="review">
Brilliant social satire with crazy twists.
</div>

</td>

<td class="stars">★★★★★</td>

</tr>

<tr data-country="FR">
<td>France</td>

<td>
<img class="flag" src="https://flagcdn.com/w40/fr.png">
</td>

<td>
<img class="poster" src="https://m.media-amazon.com/images/I/71B6W+g0YFL.jpg">
</td>

<td class="movie">

<a href="https://en.wikipedia.org/wiki/Am%C3%A9lie" target="_blank">
Amélie
</a>

<div class="review">
Beautiful quirky love letter to Paris.
</div>

</td>

<td class="stars">★★★★☆</td>

</tr>

<tr data-country="JP">
<td>Japan</td>

<td>
<img class="flag" src="https://flagcdn.com/w40/jp.png">
</td>

<td>
<img class="poster" src="https://m.media-amazon.com/images/I/81g4C1j2e-L.jpg">
</td>

<td class="movie">

<a href="https://en.wikipedia.org/wiki/Spirited_Away" target="_blank">
Spirited Away
</a>

<div class="review">
Magical and visually stunning.
</div>

</td>

<td class="stars">★★★★★</td>

</tr>

</tbody>

</table>

<script src="https://cdn.jsdelivr.net/npm/jsvectormap/dist/js/jsvectormap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsvectormap/dist/maps/world.js"></script>

<script>

let watchedCountries={}

let rows=document.querySelectorAll("#movieBody tr")

rows.forEach(row=>{

let code=row.dataset.country

let movie=row.cells[3].innerText

watchedCountries[code]=movie

})

let map=new jsVectorMap({

selector:"#map",

map:"world",

regionStyle:{
initial:{fill:"#d3d3d3"}
},

series:{
regions:[{
values:watchedCountries,
attribute:"fill",
scale:{
"default":"#4CAF50"
}
}]
},

onRegionTooltipShow:function(e,tooltip,code){

if(watchedCountries[code]){

tooltip.text(
tooltip.text()+" 🎬 "+watchedCountries[code]
)

}

}

})

document.getElementById("progress").innerText=
"🎬 Movies watched: "+rows.length+" / 195"

</script>

</body>
</html>
